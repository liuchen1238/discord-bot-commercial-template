apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord-bot
  template:
    metadata:
      labels:
        app: discord-bot
    spec:
      containers:
        - name: bot
          image: ghcr.io/your-org/discord-bot-commercial-template:latest
          command: ["python", "-m", "app.main"]
          envFrom:
            - secretRef:
                name: discord-bot-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-bot-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discord-bot-api
  template:
    metadata:
      labels:
        app: discord-bot-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/discord-bot-commercial-template:latest
          command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: discord-bot-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: discord-bot-api
spec:
  selector:
    app: discord-bot-api
  ports:
    - port: 80
      targetPort: 8000
